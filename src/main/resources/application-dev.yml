spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DEV_DATASOURCE_URL:jdbc:mysql://localhost:3306/jejuday}
    username: ${DEV_DB_USERNAME:root}
    password: ${DEV_DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 10000
      leak-detection-threshold: 2000

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 2
          time-between-eviction-runs: 5s

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
    open-in-view: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            enable: false
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul
    default-property-inclusion: non_null

  task:
    execution:
      pool:
        core-size: 5
        max-size: 10
        queue-capacity: 100
        keep-alive: 60s
        thread-name-prefix: "async-"
    scheduling:
      pool:
        size: 5
        thread-name-prefix: "scheduling-"

  transaction:
    default-timeout: 30s

  cache:
    type: redis
    redis:
      time-to-live: 600000

  scheduling:
    enabled: true

jwt:
  secret: ${JWT_SECRET}

aws:
  s3:
    accessKey: ${AWS_ACCESS_KEY_ID}
    secretKey: ${AWS_SECRET_ACCESS_KEY}
    bucketName: ${AWS_S3_BUCKET_NAME}
    region: ${AWS_REGION}

kakao:
  client:
    id: ${KAKAO_ID}
    secret: ${KAKAO_SECRET}
  redirect:
    url: ${KAKAO_REDIRECT_URL}

firebase:
  config:
    file-path: classpath:firebase/jejuday.json
  messaging:
    timeout: 10000
    retry-attempts: 3

notification:
  cache:
    score-ttl: 30m
    stats-ttl: 10m
    duplicate-prevention-ttl: 50ms
  promotion:
    post-to-spot-threshold: 10
    spot-to-challenge-percentage: 0.3
    time-decay-days: 14
    min-time-weight: 0.1
  scoring:
    reply-weight: 1
    like-weight: 3
    view-weight: 2
  like:
    milestone-interval: 50
  step:
    daily-goal: 20000
    milestone-interval: 10000
  fcm:
    enabled: true
    default-title: "제주b370이"
    connection-timeout: 5000
    read-timeout: 10000

logging:
  level:
    root: INFO
    com.goodda.jejuday.notification: DEBUG
    com.goodda.jejuday.steps: DEBUG
    com.google.firebase: WARN
    org.springframework.data.redis: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.scheduling: INFO
    org.springframework.transaction: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/jejuday-notification.log
    max-size: 10MB
    max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,scheduledtasks
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
  metrics:
    export:
      prometheus:
        enabled: true
    enable:
      jvm: true
      system: true
      process: true

server:
  address: 0.0.0.0
  port: 8080
  tomcat:
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 20000
    max-connections: 8192

app:
  cookie:
    same-site: Lax
    secure: false
